# SonarQube Project Configuration
# Place this file in the root of the project to scan

sonar.projectKey=vulnerable-web-app
sonar.projectName=Vulnerable Web App - Security Analysis
sonar.projectVersion=1.0

# Source code location
sonar.sources=app
sonar.exclusions=vendor/**,node_modules/**,public/**,storage/**

# Language
sonar.language=php

# PHP version
sonar.php.version=8.1

# SonarQube server URL
sonar.host.url=http://localhost:9000

# Authentication token (set via environment or CI/CD)
# sonar.token=${SONAR_TOKEN}

# Source encoding
sonar.sourceEncoding=UTF-8

# Coverage report (optional - requires tests)
# sonar.php.coverage.reportPaths=coverage.xml

# Enable all security rules
sonar.security.sources.javasec.enabled=true
