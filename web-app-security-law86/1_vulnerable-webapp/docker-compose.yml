version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vulnerable-webapp
    ports:
      - "8000:80"
    volumes:
      - ./app/Http:/var/www/html/app/Http
      - ./app/Models:/var/www/html/app/Models
      - ./resources:/var/www/html/resources
      - ./routes:/var/www/html/routes
      - ./database:/var/www/html/database
      - ./bootstrap/app.php:/var/www/html/bootstrap/app.php
      - ./public/robots.txt:/var/www/html/public/robots.txt
      - ./public/bay_chuot_csrf.html:/var/www/html/public/bay_chuot_csrf.html
      - ./public/.env:/var/www/html/public/.env
      - ./.env:/var/www/html/.env
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=app-db
      - DB_PORT=3306
      - DB_DATABASE=vulnerable_db
      - DB_USERNAME=appuser
      - DB_PASSWORD=apppass123
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    depends_on:
      app-db:
        condition: service_healthy
    networks:
      - app-network
    command: >
      bash -c "
        echo 'Waiting for MySQL...' &&
        while ! php -r \"new PDO('mysql:host=app-db;dbname=vulnerable_db', 'appuser', 'apppass123');\" 2>/dev/null; do
          sleep 2;
        done &&
        echo 'MySQL ready! Running migrations...' &&
        php artisan migrate --force &&
        php artisan db:seed --force &&
        echo 'Done! Starting Apache...' &&
        apache2-foreground
      "

  app-db:
    image: mysql:8.0
    container_name: vulnerable-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=vulnerable_db
      - MYSQL_USER=appuser
      - MYSQL_PASSWORD=apppass123
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "appuser", "-papppass123"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=app-db
      - PMA_USER=root
      - PMA_PASSWORD=root123
    depends_on:
      - app-db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data:
