user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Load ModSecurity module
load_module modules/ngx_http_modsecurity_module.so;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Hide Nginx version
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;

    server {
        listen 80;
        server_name localhost;

        # Enable ModSecurity
        modsecurity on;
        modsecurity_rules_file /etc/modsecurity.d/modsecurity.conf;

        # Global rate limiting
        limit_req zone=global burst=200 nodelay;

        # Block common attack paths
        location ~* (\.php\.bak|\.sql|\.env|\.git) {
            deny all;
            error_page 403 = @waf_blocked;
        }

        # Stricter rate limiting for login
        location /login {
            limit_req zone=login burst=10 nodelay;
            proxy_pass http://vulnerable-webapp:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_intercept_errors on;
            error_page 403 = @waf_blocked;
        }

        # API endpoints
        location /api/ {
            limit_req zone=api burst=60 nodelay;
            proxy_pass http://vulnerable-webapp:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_intercept_errors on;
            error_page 403 = @waf_blocked;
        }

        # Main proxy to backend
        location / {
            proxy_pass http://vulnerable-webapp:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_intercept_errors on;
            error_page 403 = @waf_blocked;
        }

        # Named location: Trang cảnh báo WAF chặn (KHÔNG BAO GIỜ bị proxy sang backend)
        location @waf_blocked {
            default_type text/html;
            return 403 '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Truy cap bi chan - WAF</title><style>body{background-color:#1a1a1a;color:#ff3333;font-family:Courier New,Courier,monospace;text-align:center;padding:50px;margin:0}.container{border:2px solid #ff3333;padding:40px;display:inline-block;box-shadow:0 0 20px #ff3333;border-radius:10px;margin-top:50px}.icon{font-size:80px;margin-bottom:20px}h1{font-size:48px;margin-bottom:10px}p{font-size:20px;color:#ccc}.footer{font-size:14px;color:#888;margin-top:30px}</style></head><body><div class="container"><div class="icon">&#x1F6D1;</div><h1>403 FORBIDDEN</h1><p>He thong Tuong lua (WAF) da phat hien hanh vi dang ngo!</p><p>Payload cua ban co chua ma doc va da bi chan.</p><p class="footer">Bao ve boi: NexusHR Security Team</p></div></body></html>';
        }

        error_page 429 /429.html;
        error_page 500 502 503 504 /50x.html;
    }
}
