# ModSecurity Configuration
# Web Application Firewall Rules

# Enable ModSecurity
SecRuleEngine On

# Audit log
SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsecurity/audit.log
SecAuditLogFormat JSON
SecAuditLogParts ABIJDEFHZ

# Request body inspection
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyLimitAction Reject

# Response body inspection
SecResponseBodyAccess On
SecResponseBodyLimit 524288

# Temporary files
SecTmpDir /tmp/
SecDataDir /tmp/

# Default action - block and log
SecDefaultAction "phase:1,log,auditlog,deny,status:403"

# =============================================
# RULE: SQL Injection Prevention (CWE-89)
# =============================================
SecRule ARGS "@detectSQLi" \
    "id:1001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'SQL Injection Attack Detected',\
    logdata:'Matched Data: %{MATCHED_VAR} found within %{MATCHED_VAR_NAME}: %{MATCHED_VAR}',\
    tag:'OWASP_TOP_10/A03',\
    tag:'CWE-89'"

# Block common SQLi payloads
SecRule ARGS "(union.*select|select.*from|insert.*into|drop.*table|delete.*from|update.*set)" \
    "id:1002,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'SQL Injection - Common Payload Detected',\
    tag:'CWE-89'"

# Block SQL comments
SecRule ARGS "(--|\/\*|\*\/|;--)" \
    "id:1003,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'SQL Injection - Comment Characters Detected'"

# =============================================
# RULE: XSS Prevention (CWE-79)
# =============================================
SecRule ARGS "@detectXSS" \
    "id:2001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'XSS Attack Detected',\
    tag:'OWASP_TOP_10/A03',\
    tag:'CWE-79'"

# Block script tags
SecRule ARGS "(<script|<\/script>|javascript:|onerror=|onload=|eval\()" \
    "id:2002,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'XSS - Script Tag Detected',\
    t:lowercase"

# Block event handlers
SecRule ARGS "(on(click|mouseover|focus|blur|load|error|submit)\s*=)" \
    "id:2003,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'XSS - Event Handler Detected',\
    t:lowercase"

# =============================================
# RULE: Path Traversal Prevention
# =============================================
SecRule ARGS "(\.\.\/)|(\.\.\\)" \
    "id:3001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Path Traversal Attack Detected',\
    tag:'CWE-22'"

# =============================================
# RULE: PHP Injection Prevention
# =============================================
SecRule ARGS "(system\(|exec\(|shell_exec\(|passthru\(|popen\(|proc_open\()" \
    "id:4001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'PHP Code Injection Detected',\
    tag:'CWE-78',\
    t:lowercase"

# =============================================
# RULE: File Upload Restriction
# =============================================
SecRule FILES_NAMES "\.php$|\.phtml$|\.php3$|\.php4$|\.php5$" \
    "id:5001,\
    phase:2,\
    deny,\
    status:403,\
    log,\
    msg:'Malicious File Upload - PHP Extension'"

# =============================================
# RULE: Bot Detection
# =============================================
SecRule REQUEST_HEADERS:User-Agent "(sqlmap|nikto|nmap|masscan|acunetix|nessus|openvas)" \
    "id:6001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Scanner/Bot Detected',\
    t:lowercase"

# =============================================
# RULE: CSRF Protection Headers Check
# =============================================
SecRule REQUEST_METHOD "POST" \
    "id:7001,\
    phase:2,\
    chain,\
    log,\
    msg:'POST Request without CSRF indicators'"
    SecRule &REQUEST_HEADERS:X-CSRF-TOKEN "@eq 0" \
        "chain"
    SecRule REQUEST_URI "^/(login|posts|profile)" \
        "setvar:tx.csrf_warning=1"

# =============================================
# CUSTOM RULES: Application Specific
# =============================================

# Block access to sensitive files
SecRule REQUEST_URI "(\.(env|git|sql|bak|backup|log|key|pem|cer)$)" \
    "id:8001,\
    phase:1,\
    deny,\
    status:403,\
    log,\
    msg:'Access to Sensitive File Blocked'"

